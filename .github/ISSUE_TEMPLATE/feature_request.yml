name: Feature request
description: Suggest an improvement or new feature
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please describe the user problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered another approach or workaround?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area of the project
      options:
        - Race replay
        - Telemetry / insights
        - CLI
        - GUI
        - Track visualization
        - Data loading
        - Documentation
        - Developer tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add examples, screenshots, links, or implementation ideas.
    validations:
      required: false
